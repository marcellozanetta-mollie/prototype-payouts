  },[p.onClose]);
  return e("div",{ref:dropRef,style:{position:"absolute",top:"100%",left:0,right:0,marginTop:4,border:"1px solid "+T.border,borderRadius:6,backgroundColor:"#fff",boxShadow:"0 8px 24px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06)",overflow:"hidden",zIndex:10,animation:"dropIn 0.15s ease-out"}},

  var amountDisplay=isFullAmount
    ?account.amount.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})
    :amount===0?"0":amount.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});

  return e("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",backgroundColor:"#edece8",fontFamily:T.font}},
    visible?e("div",{onClick:handleClose,style:{position:"fixed",inset:0,backgroundColor:animateIn?"rgba(0,0,0,0.4)":"rgba(0,0,0,0)",transition:"background-color 0.2s ease",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}},
      e("div",{onClick:function(ev){ev.stopPropagation();},style:{width:"100%",maxWidth:440,height:740,backgroundColor:"#fff",borderRadius:16,boxShadow:"0 24px 80px rgba(0,0,0,0.16), 0 2px 8px rgba(0,0,0,0.06)",transform:animateIn?"translateY(0) scale(1)":"translateY(16px) scale(0.98)",opacity:animateIn?1:0,transition:"all 0.25s cubic-bezier(0.22,1,0.36,1)",overflow:"hidden",display:"flex",flexDirection:"column"}},

        // HEADER
        e("div",{style:{display:"flex",alignItems:"center",padding:"32px 24px 0 32px",position:"relative"}},
          e("div",{style:{display:"flex",alignItems:"flex-start",gap:8,paddingRight:48,flexGrow:1}},
            e("span",{style:{fontSize:22,fontWeight:600,color:T.textPrimary,lineHeight:"130%"}},"Request payout")
          ),
          e("button",{onClick:handleClose,style:{backgroundColor:"transparent",border:"none",cursor:"pointer",display:"flex",padding:4,borderRadius:8}},e(CloseIcon))
        ),

        // MAIN
        e("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:24,padding:"12px 32px 32px",flex:1}},

          // Subtitle
          e("div",{style:{alignSelf:"stretch"}},
            e("span",{style:{fontSize:16,fontWeight:400,color:T.textSecondary,lineHeight:"130%"}},"An on-demand payout won\u2019t affect your regular payout schedule")
          ),

          // AMOUNT
          e("div",{style:{display:"flex",flexDirection:"column",gap:4,alignSelf:"stretch"}},
            e("span",{style:{fontSize:14,fontWeight:500,color:T.textSecondary,lineHeight:"130%"}},"Amount"),
            e("div",{style:{borderRadius:T.radius,overflow:"hidden",boxShadow:T.shadow}},
              // Input area
              e("div",{onClick:handleAmountClick,style:{display:"flex",alignItems:"flex-start",gap:8,padding:"16px 8px 16px 12px",backgroundColor:isFocused?"#fff":inputAreaBg,border:isFocused?"2px solid "+T.borderFocus:"1px solid "+T.border,borderBottom:isFocused?"2px solid "+T.borderFocus:"none",borderRadius:"8px 8px 0 0",cursor:"text",transition:"background-color 0.15s"}},
                isFocused
                  ?e("div",{style:{display:"flex",alignItems:"center",flex:1}},
                    e("span",{style:{fontSize:26,fontWeight:600,color:T.textPrimary,lineHeight:"130%"}},"\u20ac"),
                    e("input",{ref:inputRef,type:"text",inputMode:"decimal",value:inputValue,onChange:handleInputChange,onBlur:handleInputBlur,placeholder:"0",autoFocus:true,style:{border:"none",outline:"none",fontSize:26,fontWeight:600,color:T.textPrimary,width:"100%",backgroundColor:"transparent",fontFamily:T.font,padding:0,margin:0,lineHeight:"130%",caretColor:T.textPrimary}})
                  )
                  :e("span",{style:{fontSize:26,fontWeight:600,color:amountColor,lineHeight:"130%",flex:1}},"\u20ac"+amountDisplay)
              ),
              // Footer
              e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,padding:12,backgroundColor:T.footerBg,borderRadius:"0 0 8px 8px",border:"1px solid "+T.border,overflow:"hidden"}},
                e("div",{style:{display:"flex",alignItems:"center",gap:4}},
                  e("span",{style:{fontSize:14,fontWeight:400,color:T.textSecondary,lineHeight:"130%"}},"Full amount"),
                  e(InfoIcon)
                ),
                e(Toggle,{checked:isFullAmount,onChange:handleToggle})
              )
            ),
            e("span",{style:{fontSize:12,fontWeight:400,color:T.textSecondary,lineHeight:"130%"}},account.caption)
          ),

          // DESTINATION
          e("div",{style:{display:"flex",flexDirection:"column",gap:4,alignSelf:"stretch"}},
            e("span",{style:{fontSize:14,fontWeight:500,color:T.textSecondary,lineHeight:"130%"}},"Payout will be sent to"),
            e("div",{style:{position:"relative"}},
              e("div",{onClick:function(){setDropdownOpen(!dropdownOpen);},style:{backgroundColor:"#fff",display:"flex",alignItems:"center",gap:16,padding:12,borderRadius:T.radius,border:"1px solid "+T.border,boxShadow:T.shadow,overflow:"hidden",cursor:"pointer"}},
                e("div",{style:{display:"flex",alignItems:"center",gap:10,flexGrow:1}},
                  e(AccountIcon,{icon:account.icon,size:account.icon==="ing"?32:24}),
                  e("span",{style:{fontSize:14,fontWeight:400,color:T.textPrimary,lineHeight:"130%",flexGrow:1}},account.displayName||account.label),
                  e(ChevronDown)
                )
              ),
              dropdownOpen?e(AccountDropdown,{accounts:ACCOUNTS,selectedId:selectedAccountId,onSelect:handleSelectAccount,onClose:function(){setDropdownOpen(false);}}):null
            )
          ),

          // PAYOUT DETAILS
          e("div",{style:{display:"flex",flexDirection:"column",gap:8,alignSelf:"stretch"}},
            e("span",{style:{fontSize:14,fontWeight:500,color:T.textMuted,lineHeight:"130%"}},"Payout details"),
            e("div",{style:{display:"flex",flexDirection:"column",padding:"0 16px",borderRadius:12,border:"1px solid "+T.detailBorder}},
              detailRows.map(function(row,i){
                return e("div",{key:i,style:{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderTop:i>0?"1px solid "+T.detailBorder:"none"}},
                  e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexGrow:1}},
                    e("div",{style:{display:"flex",alignItems:"center",gap:2}},
                      e("span",{style:{fontSize:14,fontWeight:500,color:T.textPrimary,lineHeight:"130%"}},row.label),
                      row.hasInfo?e(InfoIcon):null
                    ),
                    e("span",{style:{fontSize:14,fontWeight:400,color:row.color,lineHeight:"130%",textAlign:"right"}},row.value)
                  )
                );
              })
            )
          ),

          // FOOTER
          e("div",{style:{display:"flex",flexDirection:"column",alignSelf:"stretch",marginTop:"auto",gap:16}},
            e("div",{style:{display:"flex",justifyContent:"center",alignItems:"center",height:16}},
              e("span",{style:{fontSize:12,fontWeight:400,color:T.textSecondary,lineHeight:"130%",textAlign:"center"}},account.upsell||"\u00A0")
            ),
            e("button",{disabled:isDisabled,style:{backgroundColor:isDisabled?T.btnDisabled:T.btnPrimary,height:48,display:"flex",justifyContent:"center",alignItems:"center",alignSelf:"stretch",borderRadius:T.radius,border:"none",cursor:isDisabled?"not-allowed":"pointer",transition:"background-color 0.15s ease"},
              onMouseEnter:function(ev){if(!isDisabled)ev.currentTarget.style.backgroundColor="#4a2800";},
              onMouseLeave:function(ev){if(!isDisabled)ev.currentTarget.style.backgroundColor=T.btnPrimary;}},
              e("div",{style:{display:"flex",justifyContent:"center",alignItems:"center",gap:8}},
                e(ArrowDownLeft,{color:isDisabled?T.btnDisabledText:"white"}),
                e("span",{style:{fontSize:16,fontWeight:500,color:isDisabled?T.btnDisabledText:"#fff",lineHeight:"130%"}},"Request payout")
              )
            )
          )
        )
      )
    ):null
  );
}

ReactDOM.render(e(App), document.getElementById("root"));
</script>
</body>
</html>
