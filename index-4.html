<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Payout – Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #E8E5E1; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  button { font-family: inherit; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
  .overlay.hidden { display: none; }

  .modal { background: #fff; width: 100%; max-width: 440px; border-radius: 16px; overflow: visible; display: flex; flex-direction: column; box-shadow: 0 24px 48px rgba(0,0,0,0.16); }

  .modal-header { display: flex; align-items: center; padding: 32px 24px 0 32px; position: relative; }
  .modal-header .title { flex: 1; padding-right: 48px; font-size: 22px; font-weight: 600; color: #121110; line-height: 1.3; }
  .btn-close { background: transparent; border: none; padding: 4px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .btn-close:hover { background: #F5F2F0; }

  .modal-body { display: flex; flex-direction: column; gap: 24px; padding: 12px 32px 32px; }
  .subtitle { font-size: 16px; color: #595653; line-height: 1.3; }

  .field-label { font-size: 14px; font-weight: 500; color: #595653; line-height: 1.3; }

  .amount-group { display: flex; flex-direction: column; gap: 4px; }
  .amount-field {
    border-radius: 8px; border: 1px solid #E0DDDA; background: #fff; overflow: hidden;
    box-shadow: 0px 1.5px 2px rgba(16,24,40,0.02); transition: border-color 0.15s ease, box-shadow 0.15s ease;
    cursor: text;
  }
  .amount-field:focus-within { border-color: #0040FF; box-shadow: 0 0 0 1px #0040FF; }
  .amount-field .amount-inner { padding: 16px 8px 16px 12px; }
  .amount-field input {
    border: none; outline: none; font-size: 26px; font-weight: 600; color: #121110; line-height: 1.3;
    width: 100%; background: transparent; font-family: inherit; letter-spacing: -0.01em;
  }
  .amount-helper { font-size: 12px; color: #595653; line-height: 1.3; }

  .combobox-group { display: flex; flex-direction: column; gap: 4px; position: relative; }
  .combobox-trigger { display: flex; align-items: center; gap: 16px; padding: 12px; border-radius: 8px; border: 1px solid #E0DDDA; background: #fff; box-shadow: 0px 1.5px 2px rgba(16,24,40,0.02); cursor: pointer; text-align: left; overflow: hidden; transition: border-color 0.15s ease, box-shadow 0.15s ease; width: 100%; }
  .combobox-trigger.open { border-color: #0040FF; box-shadow: 0 0 0 1px #0040FF; }
  .combobox-trigger .main-content { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .combobox-trigger .label-text { font-size: 14px; color: #121110; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .combobox-trigger .chevron { transition: transform 0.2s ease; flex-shrink: 0; display: flex; }
  .combobox-trigger.open .chevron { transform: rotate(180deg); }

  .dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #fff; border-radius: 6px; border: 1px solid #E0DDDA; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 10; overflow: hidden; display: none; }
  .dropdown.open { display: block; }
  .dropdown-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; width: 100%; border: none; background: #fff; cursor: pointer; text-align: left; transition: background 0.1s ease; }
  .dropdown-item:hover { background: #FAFAFA; }
  .dropdown-item.selected { background: #FAFAFA; }
  .dropdown-item .item-content { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .dropdown-item .item-text { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .dropdown-item .item-label { font-size: 14px; font-weight: 500; color: #121110; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dropdown-item .item-desc { font-size: 14px; color: #595653; line-height: 1.3; }

  .details-group { display: flex; flex-direction: column; gap: 8px; }
  .details-header { font-size: 14px; font-weight: 500; color: #7D7975; line-height: 1.3; }
  .details-card { border-radius: 12px; border: 1px solid #F5F2F0; overflow: hidden; }
  .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; }
  .detail-row + .detail-row { border-top: 1px solid #F5F2F0; }
  .detail-row .row-label { font-size: 14px; font-weight: 500; color: #121110; line-height: 1.3; display: flex; align-items: center; gap: 2px; }
  .detail-row .row-value { font-size: 14px; color: #595653; line-height: 1.3; }
  .detail-row .row-value.green { color: #00873C; font-weight: 500; }

  .footer-note { font-size: 12px; color: #595653; line-height: 1.3; text-align: center; }

  .btn-cta { display: flex; align-items: center; justify-content: center; gap: 8px; height: 48px; padding: 14px 16px 13px; background: #331300; border-radius: 8px; border: none; cursor: pointer; transition: opacity 0.15s ease; width: 100%; }
  .btn-cta:hover { opacity: 0.9; }
  .btn-cta span { font-size: 16px; font-weight: 500; color: #fff; line-height: 1.3; }

  .icon-ing { width: 32px; height: 32px; border-radius: 8px; background: #FF5300; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .icon-ing-sm { width: 24px; height: 24px; border-radius: 6px; background: #FF5300; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .icon-ing span, .icon-ing-sm span { color: #fff; font-size: 8px; font-weight: 700; letter-spacing: 0.5px; }
  .icon-ing span { font-size: 10px; }
  .icon-bank { border-radius: 8px; background: #F5F2F0; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .icon-bank.lg { width: 32px; height: 32px; }
  .icon-bank.sm { width: 24px; height: 24px; border-radius: 6px; }
  .icon-abna { width: 24px; height: 24px; border-radius: 6px; background: #009586; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; overflow: hidden; }

  .btn-open { padding: 14px 24px; background: #331300; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .btn-open:hover { opacity: 0.9; }
</style>
</head>
<body>

<button class="btn-open" id="openBtn" style="display:none;" onclick="openModal()">Open Request Payout</button>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="title">Request payout</span>
      <button class="btn-close" onclick="closeModal()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M2.805 2.805a1.042 1.042 0 011.473 0L10 8.527l5.722-5.722a1.042 1.042 0 011.473 1.473L11.473 10l5.722 5.722a1.042 1.042 0 01-1.473 1.473L10 11.473l-5.722 5.722a1.042 1.042 0 01-1.473-1.473L8.527 10 2.805 4.278a1.042 1.042 0 010-1.473z" fill="#121110"/></svg>
      </button>
    </div>

    <div class="modal-body">
      <p class="subtitle">An on-demand payout won't affect your regular payout schedule</p>

      <!-- Amount -->
      <div class="amount-group">
        <span class="field-label">Amount</span>
        <div class="amount-field" onclick="document.getElementById('amountInput').focus()">
          <div class="amount-inner">
            <input type="text" id="amountInput" value="€16,547.31">
          </div>
        </div>
        <span class="amount-helper">Estimated available tomorrow: €16,547.31</span>
      </div>

      <!-- Combobox -->
      <div class="combobox-group" id="comboboxGroup">
        <span class="field-label">Payout will be sent to</span>
        <button class="combobox-trigger" id="comboTrigger" onclick="toggleDropdown()">
          <div class="main-content">
            <div class="icon-ing" id="selectedIcon"><span>ING</span></div>
            <span class="label-text" id="selectedLabel">NL29 INGB 0126 9425 90</span>
          </div>
          <div class="chevron">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3.209 5.218a.75.75 0 011.102.04l4.181 4.368a.75.75 0 01-1.063 1.06L3.248 6.37a.75.75 0 01-.04-1.151z" fill="#121110"/><path d="M12.791 5.218a.75.75 0 01-.04 1.151L8.57 10.737a.75.75 0 01-1.063-1.06l4.182-4.368a.75.75 0 011.101-.04z" fill="#121110"/></svg>
          </div>
        </button>

        <div class="dropdown" id="dropdown">
          <button class="dropdown-item selected" data-account="ingb" onclick="selectAccount('ingb')">
            <div class="item-content">
              <div class="icon-ing-sm"><span>ING</span></div>
              <div class="item-text">
                <span class="item-label">NL29 INGB 0126 9425 63</span>
                <span class="item-desc">Earliest · Tomorrow</span>
              </div>
            </div>
            <svg class="check-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10.72 4.45a.75.75 0 011.262.67l-3.67 6.198a.75.75 0 01-1.263-.67l3.67-6.198z" fill="#0040FF"/><path d="M3.825 8.425a.9.9 0 011.306-1.273l3.33 3.267a.9.9 0 01-1.307 1.274L3.825 8.425z" fill="#0040FF"/></svg>
          </button>
          <button class="dropdown-item" data-account="main" onclick="selectAccount('main')">
            <div class="item-content">
              <div class="icon-bank sm">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M10 3.882a.12.12 0 00-.065-.106L6.224 1.92a.25.25 0 00-.448 0L2.065 3.776A.12.12 0 002 3.882c0 .065.053.117.118.117h7.764A.117.117 0 0010 3.882zM2.721 9A.48.48 0 002.247 9.34L2.194 9.5h7.612l-.053-.16A.48.48 0 009.358 9H2.721zM8 8h1V5H8v3zM5 8h2V5H5v3zM3 8h1V5H3v3z" fill="#383633"/></svg>
              </div>
              <div class="item-text">
                <span class="item-label">Main Account</span>
                <span class="item-desc">Instant payout · Funds sent immediately</span>
              </div>
            </div>
            <svg class="check-icon" style="display:none;" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10.72 4.45a.75.75 0 011.262.67l-3.67 6.198a.75.75 0 01-1.263-.67l3.67-6.198z" fill="#0040FF"/><path d="M3.825 8.425a.9.9 0 011.306-1.273l3.33 3.267a.9.9 0 01-1.307 1.274L3.825 8.425z" fill="#0040FF"/></svg>
          </button>
          <button class="dropdown-item" data-account="abna" onclick="selectAccount('abna')">
            <div class="item-content">
              <div class="icon-abna">
                <svg width="9" height="13" viewBox="0 0 9 13" fill="none" style="position:absolute;top:5px;left:7px;"><path d="M0 0H9V8.25L4.5 12.75L0 8.25V0Z" fill="#FCBF00"/></svg>
              </div>
              <div class="item-text">
                <span class="item-label">NL29 ABNA 0126 9425 63</span>
                <span class="item-desc">Earliest · Tomorrow</span>
              </div>
            </div>
            <svg class="check-icon" style="display:none;" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10.72 4.45a.75.75 0 011.262.67l-3.67 6.198a.75.75 0 01-1.263-.67l3.67-6.198z" fill="#0040FF"/><path d="M3.825 8.425a.9.9 0 011.306-1.273l3.33 3.267a.9.9 0 01-1.307 1.274L3.825 8.425z" fill="#0040FF"/></svg>
          </button>
        </div>
      </div>

      <!-- Payout details -->
      <div class="details-group">
        <span class="details-header">Payout details</span>
        <div class="details-card">
          <div class="detail-row">
            <span class="row-label" id="detailAmountLabel">Estimated amount</span>
            <span class="row-value" id="detailAmount">€16,547.31</span>
          </div>
          <div class="detail-row">
            <span class="row-label">Payout</span>
            <span class="row-value" id="detailPayout">Tomorrow</span>
          </div>
          <div class="detail-row">
            <span class="row-label">Payout fee <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="vertical-align:middle;margin-left:2px;"><path fill-rule="evenodd" clip-rule="evenodd" d="M8 2c3.314 0 6 2.686 6 6s-2.686 6-6 6-6-2.686-6-6 2.686-6 6-6zm-.013 1.385c.334 0 .616.103.834.335.23.22.333.49.333.8 0 .31-.103.581-.334.8a1.1 1.1 0 01-.833.323 1.1 1.1 0 01-.82-.323.98.98 0 01-.321-.8c0-.31.115-.581.32-.8a1.1 1.1 0 01.82-.335zM6.385 8h.692v2.77h-.692a.692.692 0 000 1.384h3.23a.692.692 0 000-1.385h-.692V7.538a.692.692 0 00-.692-.692H6.385a.692.692 0 000 1.384z" fill="#595653"/></svg></span>
            <span class="row-value" id="detailFee">€0,25</span>
          </div>
        </div>
      </div>

      <div id="footerNote" class="footer-note">Instant payout with Mollie Business account</div>

      <button class="btn-cta">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3.334 6a.667.667 0 011.333 0v5.333h5.334a.667.667 0 010 1.334H4a.667.667 0 01-.667-.667V6z" fill="white"/><path d="M11.363 3.695a.667.667 0 01.942.943l-7.166 7.166a.667.667 0 01-.943-.942l7.167-7.167z" fill="white"/></svg>
        <span>Request payout</span>
      </button>
    </div>
  </div>
</div>

<script>
  var selectedAccountId = 'ingb';
  var dropdownOpen = false;

  var accountAmounts = {
    ingb: '€16,547.31',
    main: '€15,327.67',
    abna: '€16,547.31'
  };

  var accounts = {
    ingb: {
      displayLabel: 'NL29 INGB 0126 9425 90',
      iconType: 'ing',
      payout: { amount: '€16,547.31', estimated: 'Tomorrow', payoutTime: 'Tomorrow', fee: '€0,25', feeGreen: false, showEstimated: true }
    },
    main: {
      displayLabel: 'Main account',
      iconType: 'bank',
      payout: { amount: '€15,327.67', estimated: null, payoutTime: 'Now', fee: 'Free', feeGreen: true, showEstimated: false }
    },
    abna: {
      displayLabel: 'NL29 ABNA 0126 9425 63',
      iconType: 'abna',
      payout: { amount: '€16,547.31', estimated: 'Tomorrow', payoutTime: 'Tomorrow', fee: '€0,25', feeGreen: false, showEstimated: true }
    }
  };

  function iconHTML(type, large) {
    if (type === 'ing') {
      return large ? '<div class="icon-ing"><span>ING</span></div>' : '<div class="icon-ing-sm"><span>ING</span></div>';
    }
    if (type === 'bank') {
      var cls = large ? 'icon-bank lg' : 'icon-bank sm';
      var s = large ? 16 : 12;
      return '<div class="' + cls + '"><svg width="' + s + '" height="' + s + '" viewBox="0 0 12 12" fill="none"><path d="M10 3.882a.12.12 0 00-.065-.106L6.224 1.92a.25.25 0 00-.448 0L2.065 3.776A.12.12 0 002 3.882c0 .065.053.117.118.117h7.764A.117.117 0 0010 3.882zM2.721 9A.48.48 0 002.247 9.34L2.194 9.5h7.612l-.053-.16A.48.48 0 009.358 9H2.721zM8 8h1V5H8v3zM5 8h2V5H5v3zM3 8h1V5H3v3z" fill="#383633"/></svg></div>';
    }
    if (type === 'abna') {
      if (large) return '<div class="icon-abna" style="width:32px;height:32px;border-radius:8px;"><svg width="9" height="13" viewBox="0 0 9 13" fill="none" style="position:absolute;top:9px;left:11px;"><path d="M0 0H9V8.25L4.5 12.75L0 8.25V0Z" fill="#FCBF00"/></svg></div>';
      return '<div class="icon-abna"><svg width="9" height="13" viewBox="0 0 9 13" fill="none" style="position:absolute;top:5px;left:7px;"><path d="M0 0H9V8.25L4.5 12.75L0 8.25V0Z" fill="#FCBF00"/></svg></div>';
    }
    return '';
  }

  function saveCurrentAmount() {
    accountAmounts[selectedAccountId] = document.getElementById('amountInput').value;
  }

  // Sync amount input with payout details in real time
  document.getElementById('amountInput').addEventListener('input', function() {
    document.getElementById('detailAmount').textContent = this.value;
  });

  function toggleDropdown() {
    dropdownOpen = !dropdownOpen;
    document.getElementById('dropdown').classList.toggle('open', dropdownOpen);
    document.getElementById('comboTrigger').classList.toggle('open', dropdownOpen);
  }

  function closeDropdown() {
    dropdownOpen = false;
    document.getElementById('dropdown').classList.remove('open');
    document.getElementById('comboTrigger').classList.remove('open');
  }

  function selectAccount(id) {
    saveCurrentAmount();
    selectedAccountId = id;
    var acc = accounts[id];

    // Update trigger icon
    var triggerMain = document.querySelector('.combobox-trigger .main-content');
    triggerMain.querySelector(':first-child').outerHTML = iconHTML(acc.iconType, true);
    document.getElementById('selectedLabel').textContent = acc.displayLabel;

    // Update amount
    document.getElementById('amountInput').value = accountAmounts[id];

    // Sync detail amount with the input value
    document.getElementById('detailAmount').textContent = accountAmounts[id];

    // First row label: "Estimated amount" for IBAN accounts, "Amount" for main
    document.getElementById('detailAmountLabel').textContent = id === 'main' ? 'Amount' : 'Estimated amount';

    // Payout row
    document.getElementById('detailPayout').textContent = acc.payout.payoutTime;

    // Fee
    var feeEl = document.getElementById('detailFee');
    feeEl.textContent = acc.payout.fee;
    feeEl.className = acc.payout.feeGreen ? 'row-value green' : 'row-value';

    document.getElementById('footerNote').style.display = id === 'main' ? 'none' : '';

    document.querySelectorAll('.dropdown-item').forEach(function(item) {
      var sel = item.dataset.account === id;
      item.classList.toggle('selected', sel);
      var chk = item.querySelector('.check-icon');
      if (chk) chk.style.display = sel ? '' : 'none';
    });

    closeDropdown();
  }

  document.addEventListener('mousedown', function(e) {
    if (dropdownOpen && !document.getElementById('comboboxGroup').contains(e.target)) {
      closeDropdown();
    }
  });

  function closeModal() {
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('openBtn').style.display = '';
  }
  function openModal() {
    document.getElementById('overlay').classList.remove('hidden');
    document.getElementById('openBtn').style.display = 'none';
  }
</script>
</body>
</html>
